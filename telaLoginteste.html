<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSecure Academy - Portal de Acesso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0c4a6e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Animação de fundo dinâmico */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(30, 58, 138, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(12, 74, 110, 0.3) 0%, transparent 50%);
            animation: gradientShift 15s ease infinite;
            z-index: -1;
        }

        @keyframes gradientShift {
            0%, 100% {
                background: 
                    radial-gradient(circle at 20% 50%, rgba(30, 58, 138, 0.3) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(12, 74, 110, 0.3) 0%, transparent 50%);
            }
            50% {
                background: 
                    radial-gradient(circle at 80% 50%, rgba(30, 58, 138, 0.3) 0%, transparent 50%),
                    radial-gradient(circle at 20% 80%, rgba(12, 74, 110, 0.3) 0%, transparent 50%);
            }
        }

        /* Partículas flutuantes */
        .floating-particles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(100, 200, 255, 0.5);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px) translateX(0px);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        /* Container principal */
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            z-index: 10;
        }

        /* Card de login */
        .login-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(30, 144, 255, 0.2);
            border-radius: 15px;
            box-shadow: 
                0 8px 32px 0 rgba(31, 38, 135, 0.37),
                0 0 50px rgba(30, 144, 255, 0.1);
            padding: 40px 30px;
            animation: slideInUp 0.8s ease-out;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo e header */
        .login-header {
            text-align: center;
            margin-bottom: 35px;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #1e90ff, #00bfff);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 0 20px rgba(30, 144, 255, 0.4);
        }

        .login-header h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #1e90ff, #00bfff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Form groups */
        .form-group {
            margin-bottom: 20px;
            animation: fadeIn 1s ease-out both;
        }

        .form-group:nth-child(1) { animation-delay: 0.4s; }
        .form-group:nth-child(2) { animation-delay: 0.5s; }
        .form-group:nth-child(3) { animation-delay: 0.6s; }

        .form-group label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
            letter-spacing: 0.5px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(30, 144, 255, 0.2);
            color: #ffffff;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-control:focus {
            background: rgba(30, 144, 255, 0.1);
            border-color: #1e90ff;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(30, 144, 255, 0.2);
            outline: none;
        }

        /* Checkbox customizado */
        .form-check {
            margin-bottom: 20px;
            animation: fadeIn 1s ease-out 0.7s both;
        }

        .form-check-input {
            width: 18px;
            height: 18px;
            border: 1px solid rgba(30, 144, 255, 0.4);
            background-color: transparent;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-check-input:checked {
            background-color: #1e90ff;
            border-color: #1e90ff;
            box-shadow: 0 0 10px rgba(30, 144, 255, 0.5);
        }

        .form-check-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            cursor: pointer;
            margin-left: 8px;
        }

        /* Botão de login */
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1e90ff, #00bfff);
            border: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 0 20px rgba(30, 144, 255, 0.3);
            animation: fadeIn 1s ease-out 0.75s both;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s ease;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            box-shadow: 0 0 30px rgba(30, 144, 255, 0.6);
            transform: translateY(-2px);
        }

        .btn-login:active {
            transform: translateY(0px);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Links */
        .login-footer {
            text-align: center;
            margin-top: 25px;
            animation: fadeIn 1s ease-out 0.85s both;
        }

        .login-footer a {
            color: #1e90ff;
            text-decoration: none;
            font-size: 13px;
            transition: all 0.3s ease;
            position: relative;
        }

        .login-footer a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -2px;
            left: 0;
            background: #1e90ff;
            transition: width 0.3s ease;
        }

        .login-footer a:hover::after {
            width: 100%;
        }

        .footer-divider {
            color: rgba(255, 255, 255, 0.3);
            margin: 0 5px;
        }

        /* Mensagens de feedback */
        .alert-message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideInDown 0.5s ease;
            font-size: 13px;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #86efac;
            display: block;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
            display: block;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #1e90ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsividade */
        @media (max-width: 576px) {
            .login-card {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 24px;
            }

            .login-container {
                padding: 15px;
            }
        }

        /* Eyes animation para decoração */
        .eyes-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        .eye {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(30, 144, 255, 0.4);
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pupil {
            width: 6px;
            height: 6px;
            background: rgba(30, 144, 255, 0.6);
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <!-- Partículas flutuantes -->
    <div class="floating-particles" id="particlesContainer"></div>

    <!-- Contêiner principal -->
    <div class="login-container">
        <div class="login-card">
            <!-- Mensagens de feedback -->
            <div class="alert-message alert-success" id="successMessage">
                <i class="fas fa-check-circle"></i> Login realizado com sucesso!
            </div>
            <div class="alert-message alert-error" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
            </div>

            <!-- Header -->
            <div class="login-header">
                <div class="logo-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1>CyberSecure</h1>
                <p>Portal de Acesso</p>
            </div>

            <!-- Formulário -->
            <form id="loginForm">
                <!-- Email/Matrícula -->
                <div class="form-group">
                    <label for="email">Email ou Matrícula</label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="email" 
                        placeholder="seu.email@cybersecure.com" 
                        required
                    >
                </div>

                <!-- Senha -->
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input 
                        type="password" 
                        class="form-control" 
                        id="password" 
                        placeholder="••••••••" 
                        required
                    >
                </div>

                <!-- Lembrar-me -->
                <div class="form-check">
                    <input 
                        class="form-check-input" 
                        type="checkbox" 
                        id="rememberMe"
                    >
                    <label class="form-check-label" for="rememberMe">
                        Lembrar de mim
                    </label>
                </div>

                <!-- Botão de Login -->
                <button type="submit" class="btn-login" id="loginBtn">
                    <span id="btnText">Acessar Portal</span>
                </button>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <a href="#" onclick="handleForgotPassword(event)">Esqueceu a senha?</a>
                <span class="footer-divider">•</span>
                <a href="#" onclick="handleSignUp(event)">Criar conta</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Criar partículas flutuantes
        function createParticles() {
            const container = document.getElementById('particlesContainer');
            const particleCount = window.innerWidth > 768 ? 30 : 15;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = (Math.random() * 4 + 2) + 'px';
                particle.style.height = particle.style.width;
                particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.opacity = Math.random() * 0.5 + 0.2;
                
                container.appendChild(particle);
            }
        }

        // Efeito dos olhos (decoração)
        function initEyesAnimation() {
            document.addEventListener('mousemove', (e) => {
                const pupils = document.querySelectorAll('.pupil');
                
                pupils.forEach(pupil => {
                    const eye = pupil.parentElement;
                    const eyeRect = eye.getBoundingClientRect();
                    const eyeCenterX = eyeRect.left + eyeRect.width / 2;
                    const eyeCenterY = eyeRect.top + eyeRect.height / 2;

                    const angle = Math.atan2(e.clientY - eyeCenterY, e.clientX - eyeCenterX);
                    const distance = 6;

                    const pupilX = Math.cos(angle) * distance;
                    const pupilY = Math.sin(angle) * distance;

                    pupil.style.transform = `translate(${pupilX}px, ${pupilY}px)`;
                });
            });
        }

        // Validação de formulário
        function validateForm() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email) {
                showError('Por favor, insira seu email ou matrícula');
                return false;
            }

            if (!password) {
                showError('Por favor, insira sua senha');
                return false;
            }

            if (password.length < 6) {
                showError('A senha deve ter pelo menos 6 caracteres');
                return false;
            }

            return true;
        }

        // Mostrar mensagem de erro
        function showError(message) {
            const errorMsg = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorMsg.style.display = 'block';
            
            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 5000);
        }

        // Mostrar mensagem de sucesso
        function showSuccess() {
            const successMsg = document.getElementById('successMessage');
            successMsg.style.display = 'block';
            
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);
        }

        // Handler do formulário
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!validateForm()) return;

            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            // Disabled e mostrar loading
            loginBtn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span>Autenticando...';

            // Simular chamada à API (remover em produção)
            setTimeout(() => {
                // Aqui você faria uma chamada real à sua API
                console.log('Email:', email);
                console.log('Password:', password);
                console.log('Lembrar:', rememberMe);

                if (rememberMe) {
                    localStorage.setItem('rememberedEmail', email);
                }

                // Simular sucesso
                showSuccess();
                btnText.textContent = 'Acessar Portal';
                loginBtn.disabled = false;

                // Redirecionar após 1.5s
                setTimeout(() => {
                    alert('Redirecionando para o dashboard...');
                    // window.location.href = '/dashboard';
                }, 1500);
            }, 1500);
        });

        // Carregar email salvo
        function loadRememberedEmail() {
            const rememberedEmail = localStorage.getItem('rememberedEmail');
            if (rememberedEmail) {
                document.getElementById('email').value = rememberedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        }

        // Handler de esqueceu a senha
        function handleForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showError('Por favor, insira seu email ou matrícula');
                return;
            }
            alert(`Email de recuperação de senha enviado para: ${email}`);
            // Aqui você faria uma chamada à sua API
        }

        // Handler de criar conta
        function handleSignUp(e) {
            e.preventDefault();
            alert('Redirecionando para página de registro...');
            // window.location.href = '/signup';
        }

        // Focus e validação em tempo real
        document.getElementById('email').addEventListener('focus', function() {
            this.style.borderColor = '#1e90ff';
        });

        document.getElementById('password').addEventListener('focus', function() {
            this.style.borderColor = '#1e90ff';
        });

        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            loadRememberedEmail();
            initEyesAnimation();
        });

        // Responsiveness
        window.addEventListener('resize', () => {
            // Ajustar partículas em redimensionamento
            if (window.innerWidth <= 768) {
                document.getElementById('particlesContainer').innerHTML = '';
                createParticles();
            }
        });
    </script>
</body>
</html>
